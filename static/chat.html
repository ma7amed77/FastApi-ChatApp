<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FastAPI Chat</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    
        <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <script defer>
            var channel_id = "global"
            var channels_masseges = {}
            var users_usernames = {"system":"System"}
            var channels_list = []
            const authData = JSON.parse(sessionStorage.getItem('authData'));
            console.log(authData)
            const user_id = authData['user_id']
            const header_temp = {"Authorization": `Bearer ${authData['access_token']}`,"Content-Type": "application/json"}
            const ws = new WebSocket(`ws://localhost:8000/ws?token=${authData['access_token']}`)
            ws.onmessage = function(event) {
                const { sender, channel, content, message_type } = JSON.parse(event.data)
                console.log(event.data)
                if(message_type == "new_channel"){
                    if (!channels_masseges[channel]) {fetchChannels();}
                }

                if (!channels_masseges[channel]) {channels_masseges[channel] = []}
                channels_masseges[channel].push({ "sender":sender, "channel":channel, "content":content})

                if (channel !== channel_id) return
                const messages = document.getElementById("messages")

                const li = create_message(sender, channel, content)
                messages.appendChild(li)
                messages.scrollTop = messages.scrollHeight
            }

            function create_message(sender, channel, content){
                const li = document.createElement("li")
                li.classList.add("list-unstyled", "mb-3", "d-flex", "w-100", sender === user_id ? "justify-content-end" : "justify-content-start")
                li.innerHTML = `
                    <div class="d-flex flex-column align-items-${sender === user_id ? 'end' : 'start'}" style="max-width: 70%">
                        <div class="text-secondary mb-1">${users_usernames[sender]}</div>
                        <div class="${sender === user_id ? 'bg-primary' : 'bg-secondary-subtle'} px-3 py-2 rounded-3 w-100" style="word-break: break-word">
                            ${content}
                        </div>
                    </div>
                `
                return li
            }

            function sendmessage(event) {
                event.preventDefault()
                const input = document.getElementById("messageText")
                if(input.value) {
                    ws.send(JSON.stringify({ content: input.value, channel_id: channel_id }))
                    input.value = ''
                }
            }

            async function fetchChannels() {
                const res = await fetch(`http://localhost:8000/channels/?user_id=${user_id}`, {method: "GET", headers:header_temp})
                const {channels} = await res.json()
                channels_list = channels
                const list = document.getElementById("channels")
                list.innerHTML = ""
                channels.forEach(channel => {
                    const li = document.createElement("li")
                    li.classList.add("px-2", "py-2", "mb-1", "rounded-0", "fs-4", "border-bottom")
                    li.style.cursor = "pointer"
                    li.textContent = channel['channel_name']
                    li.onclick = () => switchChannel(channel)
                    list.appendChild(li)
                })
            }

            async function switchChannel(channel) {
                channel_id = channel['channel_name']
                if (!channels_masseges[channel['channel_id']]){
                    response = await fetch(`http://localhost:8000/channels/${channel['channel_id']}/?user_id=${user_id}`, {method: "GET", headers:header_temp});
                    data = await response.json()
                    channels_masseges[channel['channel_id']] = data["messages"]
                    Object.assign(users_usernames, data["users"]);
                }
                document.getElementById("channel_name").innerHTML = channel['channel_name'];
                const messages = document.getElementById("messages");
                messages.innerHTML = "";
                channels_masseges[channel['channel_id']].forEach(({ sender, channel, content }) => {
                    const li = create_message(sender, channel, content)
                    messages.appendChild(li)
                })
                messages.scrollTop = messages.scrollHeight
            }
            fetchChannels().then(() => switchChannel((channels_list[0]||{"channel_name":"global","channel_id":"global",})))
            async function add_contact(other_user) {
                const res = await fetch(`http://localhost:8000/channels/add_contact/`, 
                                            {method:"POST", 
                                            headers: header_temp,
                                            body: JSON.stringify({user_email:other_user})}
                )
                console.log(other_user)
                await fetchChannels()
            }

            async function createGroup(group_id) {
                const res = await fetch(`http://localhost:8000/channels/create_group/?user_id=${user_id}`, 
                                            {method:"POST", 
                                            headers:header_temp,
                                            body: JSON.stringify({channel_name: group_id})})
                const data = await res.json()
                await fetchChannels()
                await switchChannel(data)
            }

            async function inviteUser(other_user) {
                const res = await fetch(`http://localhost:8000/channels/invite/?user_id=${user_id}`,
                                            {method:"POST", 
                                            headers: header_temp,
                                            body: JSON.stringify({channel_id:channel_id,
                                                                  added_user_id:other_user})})
                await fetchChannels()
            }
        </script>
    </head>
    <body class="overflow-hidden">
        <div class="container-fluid m-0 p-0 vh-100 d-flex">
            <div class="border-end pt-4 d-flex flex-column" style="width: 250px">
                <h2 class="px-3">FastApi Chat</h2>
                <ul id="channels" class="flex-grow-1 overflow-auto list-unstyled px-3">1</ul>
                <button class="btn btn-outline-secondary fs-3 m-4 fw-normal"
                    data-bs-toggle="modal" data-bs-target="#newChatModal">
                    New Chat
                </button>
            </div>
            <div class="d-flex flex-column flex-grow-1 pt-4 overflow-hidden">
                <div class="border-bottom fs-3 row px-3 pb-3">
                    <h3 class="col" id="channel_name">global</h3>
                    <button class="col-auto btn btn-outline-secondary me-2" data-bs-toggle="modal" data-bs-target="#inviteUserModal">Invite</button>
                </div>
                <ul id="messages" class="flex-grow-1 overflow-y-auto list-unstyled px-3 mb-0"></ul>
                <form action="" onsubmit="sendmessage(event)" class="p-3">
                    <div class="row gx-2">
                        <div class="col form-floating">
                            <input type="text" class="form-control" id="messageText" placeholder="Type your message..." autocomplete="off">
                            <label for="messageText">Type your message...</label>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-primary fs-3 fw-bolder h-100">Send</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- New Channel Window-->
        <div class="modal fade" id="newChatModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">New Chat</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="m-3 mb-0">
                        <input type="text" class="form-control" placeholder="User email / Group Name" id="newChatInput">
                    </div>
                    <div class="modal-body d-flex gap-3 justify-content-center py-4">
                        <button class="btn btn-outline-primary d-flex flex-column align-items-center gap-2 p-4 fs-5"
                            data-bs-dismiss="modal" onclick="add_contact(document.getElementById('newChatInput').value)">
                            Add User
                        </button>
                        <button class="btn btn-outline-success d-flex flex-column align-items-center gap-2 p-4 fs-5"
                            data-bs-dismiss="modal" onclick="createGroup(document.getElementById('newChatInput').value)">
                            Make a group
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>

        <!-- User invite Window -->
        <div class="modal fade" id="inviteUserModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Invite user to group</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="m-3 mb-0">
                        <input type="text" class="form-control" placeholder="User ID / Group Name" id="inviteUserInput">
                    </div>
                    <div class="modal-body d-flex gap-3 justify-content-center py-4">
                        <button class="btn btn-outline-primary d-flex flex-column align-items-center gap-2 p-4 fs-5"
                            data-bs-dismiss="modal" onclick="inviteUser(document.getElementById('inviteUserInput').value)">
                            Invite User
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>

    </body>
</html>
